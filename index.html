<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Emlak Raporu</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #f5f6fa; --card: #fff; --text: #1a1f36; --soft: #4a5568; --muted: #9aa5b4;
  --border: rgba(0,0,0,0.08); --accent: #f5a623; --radius: 12px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

/* KURUM */
.kurum-header { background: white; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--kurum-color, #C0392B); position: sticky; top: 0; z-index: 50; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.kurum-left { display: flex; align-items: center; gap: 10px; }
.kurum-icon { width: 34px; height: 34px; border-radius: 7px; background: var(--kurum-color, #C0392B); display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; font-weight: 900; }
.kurum-name { font-size: 15px; font-weight: 900; letter-spacing: 0.05em; color: var(--kurum-color, #C0392B); }
.kurum-sub  { font-size: 9px; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; }

/* AGENT */
.agent-row { background: white; padding: 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
.agent-photo { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); flex-shrink: 0; }
.agent-ph    { width: 56px; height: 56px; border-radius: 50%; background: #e5e7eb; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.agent-info  { flex: 1; min-width: 0; }
.agent-name  { font-size: 15px; font-weight: 800; }
.agent-phone { font-size: 12px; color: var(--soft); margin-top: 1px; }
.agent-title { font-size: 11px; color: var(--muted); margin-top: 1px; }
.ara-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; background: var(--accent); color: white; width: 52px; height: 52px; border-radius: 50%; text-decoration: none; border: none; cursor: pointer; flex-shrink: 0; justify-content: center; }
.ara-btn span { font-size: 9px; font-weight: 700; }

/* GİRİŞ */
.giris { background: white; padding: 18px 16px; border-bottom: 1px solid var(--border); font-size: 13px; line-height: 1.75; color: var(--soft); }
.giris strong { color: var(--text); }

/* KOMPAKT LİSTE */
.liste { padding: 14px 14px 90px; max-width: 580px; margin: 0 auto; }
.liste-baslik { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 12px; }

.kompakt-kart { background: white; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: 0 1px 6px rgba(0,0,0,0.05); margin-bottom: 10px; display: flex; align-items: stretch; overflow: hidden; min-height: 90px; }
.kompakt-foto { width: 100px; flex-shrink: 0; position: relative; overflow: hidden; background: #e5e7eb; }
.kompakt-foto img { width: 100%; height: 100%; object-fit: cover; display: block; }
.kompakt-foto-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #9ca3af; }
.kompakt-no { position: absolute; top: 6px; left: 6px; background: var(--accent); color: white; font-size: 10px; font-weight: 900; width: 22px; height: 22px; border-radius: 5px; display: flex; align-items: center; justify-content: center; }
.kompakt-body { flex: 1; padding: 10px 12px; display: flex; flex-direction: column; justify-content: space-between; min-width: 0; }
.kompakt-baslik { font-size: 12px; font-weight: 700; color: var(--text); line-height: 1.3; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.kompakt-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
.kompakt-meta span { font-size: 10px; color: var(--soft); }
.kompakt-fiyat { font-size: 14px; font-weight: 800; color: var(--text); }
.incele-btn { align-self: center; flex-shrink: 0; color: white; border: none; font-size: 11px; font-weight: 700; cursor: pointer; padding: 8px 10px; margin-right: 10px; border-radius: 8px; white-space: nowrap; font-family: inherit; }

/* MODAL */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 100; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.overlay.open { display: block; }
.modal { background: white; border-radius: 20px 20px 0 0; margin-top: 40px; min-height: calc(100vh - 40px); max-width: 580px; margin-left: auto; margin-right: auto; overflow: hidden; }
.modal-top { position: sticky; top: 0; z-index: 20; background: white; padding: 12px 14px 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-top-title { font-size: 12px; color: var(--muted); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: calc(100% - 48px); }
.modal-kapat { width: 32px; height: 32px; border-radius: 50%; background: var(--bg); border: none; font-size: 18px; color: var(--soft); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

/* GALERİ */
.m-galeri { position: relative; background: #000; }
.m-galeri img { width: 100%; height: 260px; object-fit: cover; display: block; }
.m-galeri-ph { width: 100%; height: 200px; background: #e5e7eb; display: flex; align-items: center; justify-content: center; font-size: 56px; }
.m-tag { position: absolute; top: 10px; left: 10px; background: #16a34a; color: white; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 6px; }
.m-ok { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.55); border: none; color: white; width: 38px; height: 38px; border-radius: 50%; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.m-ok.prev { left: 8px; } .m-ok.next { right: 8px; }
.m-say { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.65); color: white; font-size: 10px; padding: 3px 9px; border-radius: 12px; }
.m-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; }
.m-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.5); transition: all 0.15s; }
.m-dot.ak { background: white; width: 18px; border-radius: 3px; }
.m-thumbs { display: flex; gap: 3px; overflow-x: auto; background: #111; padding: 5px; scrollbar-width: none; }
.m-thumbs::-webkit-scrollbar { display: none; }
.m-thumbs img { height: 48px; width: 68px; object-fit: cover; border-radius: 4px; cursor: pointer; flex-shrink: 0; opacity: 0.45; border: 2px solid transparent; transition: all 0.12s; }
.m-thumbs img.ak { opacity: 1; border-color: var(--accent); }

/* MODAL BODY */
.m-meta { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #fafafa; border-bottom: 1px solid var(--border); }
.m-lokasyon { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--soft); }
.m-fiyat { font-size: 17px; font-weight: 900; color: var(--text); }
.m-props { display: flex; border-bottom: 1px solid var(--border); }
.m-prop { flex: 1; padding: 10px 8px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 4px; font-size: 12px; color: var(--soft); font-weight: 500; border-right: 1px solid var(--border); }
.m-prop:last-child { border-right: none; }
.m-btns { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
.btn-goruntule { display: flex; align-items: center; justify-content: center; color: white; border: none; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 700; text-decoration: none; cursor: pointer; font-family: inherit; }
.btn-gormek { text-align: center; font-size: 13px; color: var(--soft); text-decoration: underline; cursor: pointer; background: none; border: none; padding: 4px; font-family: inherit; }
.m-feats { padding: 0 16px 16px; }
.m-feats-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin: 14px 0 8px; }
.m-feats-wrap { display: flex; flex-wrap: wrap; gap: 5px; }
.m-feat { background: #f3f4f6; padding: 4px 10px; border-radius: 8px; font-size: 11px; color: var(--soft); }
.m-map { margin: 0 16px 16px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
.m-map iframe { display: block; width: 100%; height: 180px; border: 0; }

/* İLGİ MODAL */
.ilgi-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: flex-end; justify-content: center; }
.ilgi-overlay.open { display: flex; }
.ilgi-box { background: white; border-radius: 20px 20px 0 0; padding: 24px 20px 44px; width: 100%; max-width: 480px; }
.ilgi-title { font-size: 17px; font-weight: 800; margin-bottom: 6px; }
.ilgi-sub { font-size: 13px; color: var(--soft); margin-bottom: 16px; line-height: 1.5; }
.ilgi-name { font-size: 13px; font-weight: 700; color: #2563eb; background: #eff6ff; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; }
.ilgi-wa { display: flex; align-items: center; justify-content: center; gap: 8px; background: #25d366; color: white; padding: 14px; border-radius: 12px; text-decoration: none; font-size: 14px; font-weight: 700; margin-bottom: 10px; }
.ilgi-kapat { width: 100%; background: none; border: 1px solid var(--border); border-radius: 10px; padding: 12px; font-size: 14px; color: var(--soft); cursor: pointer; font-family: inherit; }

/* LOADING / HATA */
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 14px; color: var(--muted); }
.spinner { width: 36px; height: 36px; border-radius: 50%; border: 3px solid rgba(245,166,35,0.2); border-top-color: var(--accent); animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.hata { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 32px; gap: 10px; }
.footer { text-align: center; padding: 20px 16px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); }
.footer strong { color: #2563eb; }
</style>
</head>
<body>

<div id="app"><div class="loading"><div class="spinner"></div><div>Rapor yükleniyor...</div></div></div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-top">
      <span class="modal-top-title" id="mTopTitle">İlan Detayı</span>
      <button class="modal-kapat" onclick="modalKapat()">✕</button>
    </div>
    <div id="mIcerik"></div>
  </div>
</div>

<div class="ilgi-overlay" id="ilgiOverlay">
  <div class="ilgi-box">
    <div class="ilgi-title">🏠 Görüntüleme Talebi</div>
    <div class="ilgi-sub">Danışmanınız en kısa sürede randevu için sizi arayacak.</div>
    <div class="ilgi-name" id="ilgiAdi">—</div>
    <a id="ilgiWa" href="#" class="ilgi-wa" target="_blank">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413z"/></svg>
      WhatsApp ile Talep Gönder
    </a>
    <button class="ilgi-kapat" onclick="ilgiKapat()">Vazgeç</button>
  </div>
</div>

<script>
const KURUMLAR = {
  'kurum-remax':       { color:'#C0392B', label:'RE/MAX',       icon:'R', sub:'REAL ESTATE' },
  'kurum-coldwell':    { color:'#003087', label:'COLDWELL',     icon:'C', sub:'BANKER®' },
  'kurum-century21':   { color:'#C9A227', label:'CENTURY 21',   icon:'C', sub:'REAL ESTATE' },
  'kurum-era':         { color:'#0055A5', label:'ERA',          icon:'E', sub:'REAL ESTATE' },
  'kurum-realtyworld': { color:'#D4601A', label:'REALTY WORLD', icon:'R', sub:'REAL ESTATE' },
};
const A812 = {'1297863':0,'1297864':0,'40602':3,'40603':3,'40604':3,'40605':3,'1297865':3,'40606':8,'40607':13,'43901':18,'43902':23,'43903':28,'43904':35};
const fmt = n => Math.round(n||0).toLocaleString('tr-TR');

function binaYas(l) {
  let y = l.binaYas;
  if (y != null) { const k=String(y); if(A812[k]!==undefined) y=A812[k]; if(y>100) return ''; }
  else if (l.buildingAge) {
    const ba=l.buildingAge;
    if(/oturuma|sıfır|yeni|hazır|yapım/i.test(ba)) y=0;
    else if(/31\+|üzeri/i.test(ba)) y=35;
    else { const m=ba.match(/(\d+)\s*[-–]\s*(\d+)/); if(m) y=Math.round((+m[1]+ +m[2])/2); else {const m2=ba.match(/(\d+)/);if(m2)y=+m2[1];} }
  }
  if(y==null) return ''; return y===0?'Yeni Yapı':y+' yıl';
}

// ── VERİ ÇÖZME ──────────────────────────────────────────
function getRaporData() {
  // Önce hash'e bak (#d=...)
  const hash = window.location.hash;
  if (hash.startsWith('#d=')) {
    try {
      const b64 = decodeURIComponent(hash.slice(3));
      return JSON.parse(atob(b64));
    } catch(e) {}
  }
  // Query param'a bak (?d=...)
  const params = new URLSearchParams(window.location.search);
  const d = params.get('d');
  if (d) {
    try { return JSON.parse(atob(decodeURIComponent(d))); } catch(e) {}
  }
  return null;
}

// ── GALERİ ──────────────────────────────────────────────
let _ilanlar = [], _agentPhone = '', _accentColor = '#f5a623';
let _mCur = 0, _mPhotos = [];

function modalAc(idx) {
  const l = _ilanlar[idx]; if (!l) return;
  _mPhotos = l.photos?.length ? l.photos : (l.image ? [l.image] : []);
  _mCur = 0;
  const yas = binaYas(l), kat = l.floorText || '';
  const tip = l.tip === 'kiralik' ? 'Kiralık' : 'Satılık';
  const loc = l._location || {};
  const koord = loc.lat && +loc.lat > 35;
  const adres = loc.address || (typeof l.location==='string' ? l.location : '') || '';
  const bolge = adres || (l.location||'').split('/').pop()?.trim() || '';
  const mapQ  = koord ? `${(+loc.lat).toFixed(6)},${(+loc.lon).toFixed(6)}` : encodeURIComponent(bolge+' İstanbul');
  const feats = Object.values(l.features||{}).flat();
  const no = String(idx+1).padStart(2,'0');
  document.getElementById('mTopTitle').textContent = no+' · '+(l.customTitle||l.title||'').slice(0,40);

  document.getElementById('mIcerik').innerHTML = `
    <div class="m-galeri">
      ${_mPhotos.length ? `<img id="mCover" src="${_mPhotos[0]}">` : `<div class="m-galeri-ph">🏠</div>`}
      <div class="m-tag">${tip}-Konut</div>
      ${_mPhotos.length>1?`
        <button class="m-ok prev" onclick="mNav(-1)">‹</button>
        <button class="m-ok next" onclick="mNav(1)">›</button>
        <div class="m-say" id="mSay">📷 1/${_mPhotos.length}</div>
        <div class="m-dots" id="mDots">${_mPhotos.slice(0,8).map((_,i)=>`<div class="m-dot${i===0?' ak':''}"></div>`).join('')}</div>`:''}
    </div>
    ${_mPhotos.length>1?`<div class="m-thumbs" id="mThumbs">${_mPhotos.map((p,i)=>`<img src="${p}" class="${i===0?'ak':''}" onclick="mNav(null,${i})" loading="lazy">`).join('')}</div>`:''}
    <div class="m-meta">
      <div class="m-lokasyon">📍 ${bolge}</div>
      <div class="m-fiyat">${l.price?fmt(l.price)+' TL':'—'}</div>
    </div>
    ${(l.roomCount||l.size||kat||yas)?`
    <div class="m-props">
      ${l.roomCount?`<div class="m-prop">🛏 ${l.roomCount}</div>`:''}
      ${l.size?`<div class="m-prop">📐 ${l.size} m²</div>`:''}
      ${kat?`<div class="m-prop">🏢 ${kat}</div>`:''}
      ${yas?`<div class="m-prop">🏗 ${yas}</div>`:''}
    </div>`:''}
    <div class="m-btns">
      ${l.url?`<a href="${l.url}" target="_blank" class="btn-goruntule" style="background:${_accentColor}">İlanı Görüntüle</a>`:''}
      <button class="btn-gormek" onclick="ilgiAc(${idx})">Bu mülkü görmek istiyorum</button>
    </div>
    ${feats.length?`<div class="m-feats"><div class="m-feats-title">Özellikler</div><div class="m-feats-wrap">${feats.map(f=>`<span class="m-feat">${f}</span>`).join('')}</div></div>`:''}
    ${(koord||bolge)?`<div class="m-map"><iframe src="https://www.google.com/maps?q=${mapQ}&z=${koord?16:14}&output=embed" loading="lazy"></iframe></div>`:''}`;

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function modalKapat() { document.getElementById('overlay').classList.remove('open'); document.body.style.overflow=''; }

function mNav(dir, ti) {
  if (!_mPhotos.length) return;
  _mCur = ti!=null ? ti : (_mCur+dir+_mPhotos.length)%_mPhotos.length;
  const cover=document.getElementById('mCover'); if(cover) cover.src=_mPhotos[_mCur];
  const say=document.getElementById('mSay'); if(say) say.textContent=`📷 ${_mCur+1}/${_mPhotos.length}`;
  document.querySelectorAll('#mThumbs img').forEach((t,i)=>{t.classList.toggle('ak',i===_mCur);if(i===_mCur)t.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});});
  document.querySelectorAll('#mDots .m-dot').forEach((d,i)=>d.classList.toggle('ak',i===_mCur));
}

document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))modalKapat();});

function ilgiAc(idx) {
  const l=_ilanlar[idx]; if(!l) return;
  document.getElementById('ilgiAdi').textContent = l.customTitle||l.title||'';
  const msg=encodeURIComponent(`Merhaba, "${l.customTitle||l.title}" ilanını görmek istiyorum. Randevu alabilir miyim?`);
  const tel=_agentPhone.replace(/\D/g,'');
  document.getElementById('ilgiWa').href = tel?`https://wa.me/${tel}?text=${msg}`:`https://wa.me/?text=${msg}`;
  document.getElementById('ilgiOverlay').classList.add('open');
}
function ilgiKapat() { document.getElementById('ilgiOverlay').classList.remove('open'); }
document.getElementById('ilgiOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('ilgiOverlay'))ilgiKapat();});

// ── RENDER ──────────────────────────────────────────────
function render(data) {
  _ilanlar = data.ilanlar || [];
  const ag = data.agent || {};
  const P  = data.palet  || 'klasik';
  const kurum = KURUMLAR[P];
  _agentPhone = ag.phone || '';
  _accentColor = kurum?.color || '#f5a623';
  if (kurum) document.documentElement.style.setProperty('--kurum-color', kurum.color);
  document.documentElement.style.setProperty('--accent', _accentColor);

  let h = '';

  if (kurum) {
    h += `<div class="kurum-header">
      <div class="kurum-left">
        <div class="kurum-icon">${kurum.icon}</div>
        <div><div class="kurum-name">${kurum.label}</div><div class="kurum-sub">${kurum.sub}</div></div>
      </div>
      <button onclick="this.closest('.kurum-header').style.display='none'" style="background:none;border:none;font-size:22px;color:#9aa5b4;cursor:pointer">×</button>
    </div>`;
  }

  const tel = ag.phone?.replace(/\D/g,'') || '';
  h += `<div class="agent-row">
    ${ag.photo?`<img src="${ag.photo}" class="agent-photo" onerror="this.style.display='none'">`:`<div class="agent-ph">👤</div>`}
    <div class="agent-info">
      <div class="agent-name">${ag.name||'Gayrimenkul Danışmanı'}</div>
      ${ag.phone?`<div class="agent-phone">${ag.phone}</div>`:''}
      <div class="agent-title">${ag.title||'Emlak Danışmanı'}${ag.office?' · '+ag.office:''}</div>
    </div>
    ${tel?`<a href="tel:${tel}" class="ara-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
      <span>Ara</span>
    </a>`:''}
  </div>`;

  const musteriAdi = data.musteri ? `Sayın ${data.musteri},` : 'Merhaba,';
  h += `<div class="giris">
    <p><strong>${musteriAdi}</strong></p>
    <p style="margin-top:8px">Gayrimenkul arayışınıza uygun olduğunu düşündüğüm ilanları aşağıda görebilirsiniz. İlgilendiğiniz gayrimenkulleri <strong>«Bu mülkü görmek istiyorum»</strong> seçeneği ile işaretlerseniz randevuyu düzenleyeceğim.</p>
    <p style="margin-top:12px">Saygılarımla;<br><strong>${ag.name||'Danışmanınız'}</strong></p>
  </div>`;

  h += `<div class="liste"><div class="liste-baslik">📋 ${_ilanlar.length} Mülk Listelendi</div>`;

  _ilanlar.forEach((l, i) => {
    const cover = l.photos?.[0] || l.image || '';
    const yas = binaYas(l);
    const no  = String(i+1).padStart(2,'0');
    const bolge = (l.location||'').split('/').pop()?.trim() || '';

    h += `<div class="kompakt-kart">
      <div class="kompakt-foto">
        ${cover?`<img src="${cover}" loading="lazy">`:`<div class="kompakt-foto-ph">🏠</div>`}
        <div class="kompakt-no">${no}</div>
        ${l.photos?.length>1?`<div style="position:absolute;bottom:4px;left:4px;background:rgba(0,0,0,0.6);color:white;font-size:8px;padding:2px 5px;border-radius:8px;font-weight:600">📷${l.photos.length}</div>`:''}
      </div>
      <div class="kompakt-body">
        <div>
          <div class="kompakt-baslik">${l.customTitle||l.title||''}</div>
          <div class="kompakt-meta">
            ${bolge?`<span>📍 ${bolge}</span>`:''}
            ${l.size?`<span>📐 ${l.size}m²</span>`:''}
            ${l.roomCount?`<span>🛏 ${l.roomCount}</span>`:''}
            ${yas?`<span>🏗 ${yas}</span>`:''}
          </div>
        </div>
        <div class="kompakt-fiyat">${l.price?fmt(l.price)+' TL':'—'}</div>
      </div>
      <button class="incele-btn" onclick="modalAc(${i})" style="background:${_accentColor}">İncele ›</button>
    </div>`;
  });

  h += `<div class="footer"><div>Bu rapor <strong>EmlakAnaliz</strong> ile hazırlandı</div><div style="margin-top:3px">${data.tarih||''}</div></div></div>`;
  document.getElementById('app').innerHTML = h;
  document.title = (ag.name||'Emlak')+' · Rapor';
}

function hata(msg) {
  document.getElementById('app').innerHTML = `
    <div class="hata">
      <div style="font-size:44px">😔</div>
      <div style="font-size:17px;font-weight:700">Rapor yüklenemedi</div>
      <div style="font-size:13px;color:var(--soft);margin-top:6px">${msg||'Link geçersiz.'}</div>
    </div>`;
}

// ── BAŞLAT ──────────────────────────────────────────────
const data = getRaporData();
if (data) {
  render(data);
} else {
  hata('Rapor verisi bulunamadı. Lütfen geçerli bir link kullanın.');
}
</script>
</body>
</html>
